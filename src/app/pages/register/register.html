<div class="register-page">
  <!-- Animated background -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="register-container">
    <!-- Right panel - Branding -->
    <div class="brand-panel">
      <div class="brand-content">
        <div class="brand-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <h1 class="brand-title">خيــر</h1>
        <p class="brand-subtitle">نظام إدارة الجمعيات الخيرية</p>
        <p class="brand-desc">سجل حسابك الجديد وانضم إلينا</p>

        <div class="brand-features">
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 8 12 12 16 14"/>
              </svg>
            </div>
            <span>دخول سريع وآمن</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <span>سهولة الاستخدام</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Left panel - Register Form -->
    <div class="form-panel">
      <div class="form-content">
        <div class="form-header">
          <h2>إنشاء حساب جديد</h2>
          <p>أدخل بياناتك لإنشاء حساب في النظام</p>
        </div>

        <!-- Success Message -->
        @if (successMessage()) {
          <div class="success-alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>{{ successMessage() }}</span>
          </div>
        }

        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="error-alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <form class="register-form" (ngSubmit)="onRegister()">
          <div class="form-grid">
            <div class="form-group">
              <label for="name">الاسم بالكامل</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                <input id="name" type="text" [(ngModel)]="registerData.name" name="name" placeholder="أدخل اسمك" required />
              </div>
            </div>

            <div class="form-group">
              <label for="username">اسم المستخدم</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="4"/>
                  <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
                </svg>
                <input id="username" type="text" [(ngModel)]="registerData.username" name="username" placeholder="أدخل اسم المستخدم" required />
              </div>
            </div>

            <div class="form-group">
              <label for="phone">رقم الهاتف</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                <input id="phone" type="tel" [(ngModel)]="registerData.phone" name="phone" placeholder="01xxxxxxxxx" required />
              </div>
            </div>

            <div class="form-group">
              <label for="email">البريد الإلكتروني (اختياري)</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
                <input id="email" type="email" [(ngModel)]="registerData.email" name="email" placeholder="email@example.com" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="address">العنوان</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <input id="address" type="text" [(ngModel)]="registerData.address" name="address" placeholder="أدخل العنوان بالتفصيل" required />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input id="password" type="password" [(ngModel)]="registerData.password" name="password" placeholder="كلمة المرور" required />
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">تأكيد كلمة المرور</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="أعد إدخال كلمة المرور" required />
              </div>
            </div>
          </div>

          <button type="submit" class="register-btn" [disabled]="isLoading()">
            @if (isLoading()) {
              <div class="spinner"></div>
              <span>جاري إنشاء الحساب...</span>
            } @else {
              <span>إنشاء حساب</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
            }
          </button>
        </form>

        <div class="form-footer">
          <p>لديك حساب بالفعل؟ <a routerLink="/login">تسجيل الدخول</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
