<div class="login-page">
  <!-- Animated background -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="login-container">
    <!-- Right panel - Branding (appears on the right in RTL) -->
    <div class="brand-panel">
      <div class="brand-content">
        <div class="brand-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <h1 class="brand-title">خيــر</h1>
        <p class="brand-subtitle">نظام إدارة الجمعيات الخيرية</p>
        <p class="brand-desc">Charity Management System</p>

        <div class="brand-features">
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <span>إدارة المستفيدين</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                <line x1="1" y1="10" x2="23" y2="10"/>
              </svg>
            </div>
            <span>تتبع التبرعات</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
              </svg>
            </div>
            <span>التقارير والإحصائيات</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Left panel - Login Form (appears on the left in RTL) -->
    <div class="form-panel">
      <div class="form-content">
        <div class="form-header">
          <h2>مرحباً بعودتك</h2>
          <p>سجل الدخول إلى حسابك للمتابعة</p>
        </div>

        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="error-alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <form class="login-form" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input
                id="username"
                type="text"
                [(ngModel)]="username"
                name="username"
                placeholder="أدخل اسم المستخدم"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">كلمة المرور</label>
              <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
            </div>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                id="password"
                type="password"
                [(ngModel)]="password"
                name="password"
                placeholder="أدخل كلمة المرور"
                autocomplete="current-password"
                required
              />
            </div>
          </div>

          <div class="remember-row">
            <label class="checkbox-label">
              <input type="checkbox" />
              <span>تذكرني</span>
            </label>
          </div>

          <button type="submit" class="login-btn" [disabled]="isLoading()">
            @if (isLoading()) {
              <div class="spinner"></div>
              <span>جاري تسجيل الدخول...</span>
            } @else {
              <span>تسجيل الدخول</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
            }
          </button>
        </form>

        <div class="form-footer">
          <p>ليس لديك حساب؟ <a href="#">تواصل مع المسؤول</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
